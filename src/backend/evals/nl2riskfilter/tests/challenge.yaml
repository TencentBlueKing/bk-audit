# D7: 策略名称模糊匹配（用户不记得完整名称）
- description: "D7-挑战：策略名称模糊匹配"
  vars:
    query: "WeTERM相关的风险"
    tags: "[]"
    strategies: '[{"id": 1, "name": "外包操作审计-WeTERM登录容器"}, {"id": 15, "name": "命令安全分析-WeTERM"}, {"id": 110, "name": "【回归】离线策略审计"}]'
    expected_keys: '["strategy_id"]'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:is_non_empty_filter"

# D8: 事件字段否定操作符（!= 操作）
- description: "D8-挑战：事件字段否定操作（策略110）"
  vars:
    query: "操作人不是admin的风险"
    tags: "[]"
    strategies: '[{"id": 110, "name": "【回归】离线策略审计"}]'
    expected_keys: '["event_filters"]'
    expected_event_fields: '["操作人"]'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:is_non_empty_filter"
    - type: python
      value: "file://assertions/check_filters.py:has_event_filter_field"

