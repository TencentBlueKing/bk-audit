# D. 挑战场景（14 个）— 当前模型不一定能通过，用于多模型对比评估
#
# 设计目的：暴露模型能力边界，为多模型对比提供区分度

# D1: 复合时间表达（相对时间 + 条件组合）
- description: "D1-挑战：上周三到本周一之间张三负责的高危风险"
  vars:
    query: "上周三到本周一之间张三负责的高危风险"
    tags: "[]"
    strategies: "[]"
    expected_keys: '["start_time", "end_time", "operator", "risk_level"]'
    expected_values: '{"operator": "张三", "risk_level": "HIGH"}'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:partial_match"

# D2: 否定语义（排除条件）
- description: "D2-挑战：不是张三负责的高危风险"
