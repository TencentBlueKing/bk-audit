# D10: 条件优先级冲突（"我负责的"vs 事件字段中的"操作人"）
- description: "D10-挑战：operator字段与事件字段操作人区分"
  vars:
    query: "我负责的风险中操作人包含admin的"
    tags: "[]"
    strategies: '[{"id": 110, "name": "【回归】离线策略审计"}]'
    expected_keys: '["operator", "event_filters"]'
    expected_values: '{"operator": "{{username}}"}'
    expected_event_fields: '["操作人"]'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:partial_match"

