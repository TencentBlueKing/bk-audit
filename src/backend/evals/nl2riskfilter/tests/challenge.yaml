# D. 挑战场景（12 个）— 当前模型不一定能通过，用于多模型对比评估
#
# 设计目的：暴露模型能力边界，为多模型对比提供区分度

# D1: 复合时间表达（相对时间 + 条件组合）
- description: "D1-挑战：上周三到本周一之间张三负责的高危风险"
  vars:
    query: "上周三到本周一之间张三负责的高危风险"
    tags: "[]"
    strategies: "[]"
    expected_keys: '["start_time", "end_time", "operator", "risk_level"]'
    expected_values: '{"operator": "张三", "risk_level": "HIGH"}'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:partial_match"

# D2: 否定语义（排除条件）
- description: "D2-挑战：不是张三负责的高危风险"
  vars:
    query: "不是张三负责的高危风险"
    tags: "[]"
    strategies: "[]"
    expected_keys: '["risk_level"]'
    expected_values: '{"risk_level": "HIGH"}'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:partial_match"

# D3: 隐含条件推理（"紧急"暗示高优先级）
- description: "D3-挑战：需要紧急处理的风险"
  vars:
    query: "需要紧急处理的风险"
    tags: '[{"id": 1, "name": "重要"}, {"id": 2, "name": "紧急"}]'
    strategies: "[]"
  assert:
    - type: python
      value: "file://assertions/check_filters.py:is_non_empty_filter"

# D4: 多维度全条件组合（时间+人员+等级+策略+事件字段+排序）
- description: "D4-挑战：最近一周张三负责的离线策略审计高危风险中来源IP包含10.0的按时间降序"
  vars:
    query: "最近一周张三负责的离线策略审计高危风险中来源IP包含10.0的，按时间降序排列"
    tags: "[]"
    strategies: '[{"id": 110, "name": "【回归】离线策略审计"}]'
    expected_keys: '["operator", "risk_level", "strategy_id", "start_time", "sort"]'
    expected_values: '{"operator": "张三", "risk_level": "HIGH", "strategy_id": "110"}'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:partial_match"

