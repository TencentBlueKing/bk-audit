# B1: 单事件字段 — 来源IP（策略110）
- description: "B1-复杂：来源IP包含10.0的风险（策略110）"
  vars:
    query: "来源IP包含10.0的风险"
    tags: "[]"
    strategies: '[{"id": 110, "name": "【回归】离线策略审计"}]'
    expected_keys: '["event_filters"]'
    expected_event_fields: '["来源IP"]'
  assert:
    - type: python
      value: "file://assertions/check_filters.py:is_non_empty_filter"
    - type: python
      value: "file://assertions/check_filters.py:has_expected_keys"
    - type: python
      value: "file://assertions/check_filters.py:has_event_filter_field"

